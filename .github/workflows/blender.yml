name: blender-renders

on:
  push:
    paths:
      - "skills/blender-render/**"
      - ".github/workflows/blender.yml"
  pull_request:
    paths:
      - "skills/blender-render/**"
      - ".github/workflows/blender.yml"
  workflow_dispatch:

concurrency:
  group: blender-${{ github.ref }}
  cancel-in-progress: true

env:
  ASSETS: skills/blender-render/assets

jobs:
  test-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build Blender image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.ASSETS }}
          load: true
          tags: blender-render:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test render (still + short animation, CPU)
        run: |
          docker run --rm -v "$PWD:/work" -w /work/$ASSETS blender-render:ci -lc '
            set -e
            blender -b -P render.py -- --mode still --device CPU \
              --samples 16 --res 640x360 --out /work/renders/still --label "CI test render"
            blender -b -P render.py -- --mode animation --device CPU \
              --samples 12 --res 480x270 --start 1 --end 12 --out /work/renders/anim
            ./encode.sh /work/renders/anim /work/renders/anim/render.mp4 24
          '

      - name: Upload render artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blender-test-renders
          path: |
            renders/still.png
            renders/anim/render.mp4
          retention-days: 30

  publish-image:
    needs: test-render
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/blender" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.ASSETS }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
