name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill frontmatter
        run: python3 tools/validate_skills.py
      - name: Shellcheck run scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck example/run.sh skills/docker-run/assets/run.sh

  test-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r example/requirements.txt
      - name: Test
        run: FORCE_HOST=1 ./example/run.sh test
      - name: Generate plot
        run: FORCE_HOST=1 ./example/run.sh example/output
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pt_spectrum-pdf
          path: example/output/pt_spectrum.pdf
          retention-days: 30

  publish-image:
    needs: [validate-skills, test-example]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: example/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
