; Starting-point export presets for CI. Godot's editor normally writes this file
; (Project > Export); regenerate it there if options drift between versions.
; Preset NAMES must match run.sh / ci.yml ("Web", "Linux/X11", "Windows Desktop",
; "macOS"). export_path must match run.sh OUTFILE.

[preset.0]
name="Web"
platform="Web"
runnable=true
export_path="build/web/index.html"

[preset.0.options]
; GitHub Pages does not send COOP/COEP headers, so SharedArrayBuffer is
; unavailable — disable thread support so the web build runs there.
threads/thread_support=false
html/export_icon=true

[preset.1]
name="Linux/X11"
platform="Linux/X11"
runnable=true
export_path="build/linux/game.x86_64"

[preset.1.options]

[preset.2]
name="Windows Desktop"
platform="Windows Desktop"
runnable=true
export_path="build/windows/game.exe"

[preset.2.options]

[preset.3]
name="macOS"
platform="macOS"
runnable=true
export_path="build/mac/game.zip"

[preset.3.options]
export/distribution_type=0
