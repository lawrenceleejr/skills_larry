# Build a Godot game for all common platforms in Docker, smoke-test the web
# export, and deploy it to GitHub Pages from main only if it runs in a browser.
# Copy this to .github/workflows/game.yml in the game repo (with Dockerfile,
# run.sh, export_presets.cfg, smoke_web.py at the repo root).
name: game

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: game-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Godot image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: godot-export:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export all platforms
        run: |
          docker run --rm -v "$PWD:/project" -w /project -e IN_CONTAINER=1 \
            --entrypoint bash godot-export:ci ./run.sh all
      - name: Upload desktop builds
        uses: actions/upload-artifact@v4
        with:
          name: game-desktop
          path: |
            build/linux/**
            build/windows/**
            build/mac/**
          retention-days: 30
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: game-web
          path: build/web/**
          retention-days: 30

  smoke-web:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.smoke.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: game-web
          path: build/web
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Smoke-test web build in a browser
        id: smoke
        run: python smoke_web.py build/web

  deploy-pages:
    needs: smoke-web
    # Only deploy from the default branch, and only if the browser smoke test passed.
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.smoke-web.outputs.passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: game-web
          path: build/web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - id: deployment
        uses: actions/deploy-pages@v4
