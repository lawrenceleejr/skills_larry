# Build a desktop app across OSes and upload downloadable artifacts.
# On tag pushes (v*), also attach binaries to a GitHub Release.
name: desktop-build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # --- adapt this to your toolchain (Electron / Tauri / PyInstaller / Qt) ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt pyinstaller
      - name: Build
        run: pyinstaller --onefile --name app app/main.py
      # -------------------------------------------------------------------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/*
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
